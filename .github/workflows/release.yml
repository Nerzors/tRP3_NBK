name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # BigWigs Packager reads git history to resolve version
          # substitutions like @project-version@ / @file-hash@.
          # Shallow clones break that.
          fetch-depth: 0

      - name: Package and release
        uses: BigWigsMods/packager@v2
        with:
          args: -t ${{ github.workspace }}/totalRP3_NerzorsBlacklistKeeper
        env:
          CF_API_KEY:     ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
